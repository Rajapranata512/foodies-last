name: Deploy InfinityFree

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-infinityfree-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_mysql, fileinfo
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

      - name: Deploy app core to /htdocs/laravel_app
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.INFINITYFREE_FTP_SERVER }}
          username: ${{ secrets.INFINITYFREE_FTP_USERNAME }}
          password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          state-name: .ftp-state-app.json
          dangerous-clean-slate: false
          server-dir: /htdocs/laravel_app/
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/.env
            **/.env.*
            **/deploy/**
            **/*.zip

      - name: Deploy public assets to /htdocs (attempt 1)
        id: deploy_public_try1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.INFINITYFREE_FTP_SERVER }}
          username: ${{ secrets.INFINITYFREE_FTP_USERNAME }}
          password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          state-name: .ftp-state-public.json
          dangerous-clean-slate: false
          server-dir: /htdocs/
          local-dir: ./public/
          exclude: |
            **/index.php
            **/hot

      - name: Deploy public assets to /htdocs (retry)
        id: deploy_public_try2
        if: steps.deploy_public_try1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.INFINITYFREE_FTP_SERVER }}
          username: ${{ secrets.INFINITYFREE_FTP_USERNAME }}
          password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          state-name: .ftp-state-public.json
          dangerous-clean-slate: false
          server-dir: /htdocs/
          local-dir: ./public/
          exclude: |
            **/index.php
            **/hot

      - name: Fail if public deploy still fails after retry
        if: steps.deploy_public_try1.outcome == 'failure' && steps.deploy_public_try2.outcome == 'failure'
        run: |
          echo "Public asset deployment failed after retry."
          exit 1

      - name: Deploy InfinityFree front controller (htdocs/index.php)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.INFINITYFREE_FTP_SERVER }}
          username: ${{ secrets.INFINITYFREE_FTP_USERNAME }}
          password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          state-name: .ftp-state-index.json
          dangerous-clean-slate: false
          server-dir: /htdocs/
          local-dir: ./deploy/infinityfree/
